<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강사 섭외 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- ✅ Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, push, remove, update }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ══════════════════════════════════════════════════
  // 🔧 여기에 Firebase 설정값을 붙여넣으세요
  // (또는 앱 우측 상단 ⚙️ Firebase 설정 버튼 사용)
  // ══════════════════════════════════════════════════
  const _hardcoded = {
    apiKey:            "AIzaSyDbAg0u3z41sYlYKK6g1rU_czJFHhv3iPc",
    authDomain:        "jusjks-a7d28.firebaseapp.com",
    databaseURL:       "https://jusjks-a7d28-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "jusjks-a7d28",
    storageBucket:     "jusjks-a7d28.firebasestorage.app",
    messagingSenderId: "1073939079509",
    appId:             "1:1073939079509:web:9d3b4dd374408f59208fdc",
    measurementId:     "G-HNK79B0B2F"
  };
  const firebaseConfig = _hardcoded;
  // ══════════════════════════════════════════════════

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const dbRef = ref(db, "instructors");
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // ✅ 허용된 이메일 목록
  const ALLOWED_EMAILS = [
    "jusjyb@gmail.com",
    "ned812@gmail.com",
  ];

  // 로그인 함수
  window.googleLogin = async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      const email = result.user.email;
      if (!ALLOWED_EMAILS.includes(email)) {
        await signOut(auth);
        document.getElementById("loginError").textContent = `❌ ${email} 은 접근 권한이 없습니다.`;
        return;
      }
    } catch(e) {
      console.error(e);
    }
  };

  // 팀원 이름 목록
  const TEAM_MEMBERS = ["백기웅", "윤소라", "김영균"];

  // 로그아웃 함수
  window.googleLogout = () => { signOut(auth); window._workerName = null; };

  // 이름 선택 함수
  window.selectWorker = (name) => {
    window._workerName = name;
    document.getElementById("workerModal").style.display = "none";
    document.getElementById("appScreen").style.display = "flex";
    document.getElementById("workerBadge").textContent = name;
    // 모바일 메뉴 유저 이름도 업데이트
    const mobileUserInfo = document.getElementById("mobileUserInfo");
    if(mobileUserInfo) mobileUserInfo.textContent = `👤 ${name}`;
    window._appReady = true;
    if(window._instructors) window.render();
  };

  // 인증 상태 감지
  onAuthStateChanged(auth, (user) => {
    if (user && ALLOWED_EMAILS.includes(user.email)) {
      // 로그인 성공 → 이름 선택 팝업 표시
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("appScreen").style.display = "none";
      document.getElementById("workerModal").style.display = "flex";
      // 유저 정보 표시
      document.getElementById("userInfo").innerHTML = `
        <img src="${user.photoURL||''}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid #334155;">
        <span id="workerBadge" style="font-size:12px;color:#e2e8f0;font-weight:600;"></span>
        <button onclick="googleLogout()" style="background:#2d0a0a;color:#ef4444;border:1px solid #7f1d1d;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;">로그아웃</button>
      `;
      window._currentUser = user;
      // 모바일 메뉴 유저 정보
      const mobileUserInfo = document.getElementById("mobileUserInfo");
      if(mobileUserInfo) mobileUserInfo.textContent = `👤 ${window._workerName||user.displayName||user.email}`;
    } else {
      // 미로그인 → 로그인 화면 표시
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("appScreen").style.display = "none";
      document.getElementById("workerModal").style.display = "none";
      window._currentUser = null;
      window._workerName = null;
      window._appReady = false;
    }
  });

  // Firebase → 앱으로 실시간 반영
  onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      window._instructors = Object.entries(data).map(([id, val]) => ({ id, ...val }));
    } else {
      window._instructors = [];
    }
    if (window._appReady) window.render();
    else window._instructors = window._instructors || [];
  });

  // 추가
  window.fbAdd = (data) => push(dbRef, data);

  // 수정
  window.fbUpdate = (id, data) => update(ref(db, `instructors/${id}`), data);

  // 삭제
  window.fbDelete = (id) => remove(ref(db, `instructors/${id}`));

  window._dbReady = true;
  document.dispatchEvent(new Event("firebase-ready"));

  // firebase-ready 이벤트는 workerModal에서 selectWorker 후 처리
</script>

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0a0f1a;--bg2:#0d1420;--card:#111827;--border:#1e293b;
    --text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;--faint:#334155;
    --blue:#3b82f6;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;
  }
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px;}
  button{cursor:pointer;border:none;font-family:inherit;}
  input,select,textarea{font-family:inherit;outline:none;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;}
  .btn-primary{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;transition:opacity .2s;}
  .btn-primary:hover{opacity:.85;}
  .btn-ghost{background:transparent;color:var(--muted);padding:6px 12px;border-radius:6px;font-size:12px;transition:all .15s;border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--border);color:var(--text);}
  .btn-danger{background:#2d0a0a;color:var(--red);border:1px solid #7f1d1d;padding:4px 10px;border-radius:6px;font-size:11px;}
  .input-field{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;width:100%;transition:border-color .15s;}
  .input-field:focus{border-color:var(--blue);}
  .input-field::placeholder{color:#475569;}
  .pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;}
  .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;}
  .hover-row:hover{background:#1a2332;}
  @keyframes slideIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .animate-in{animation:slideIn .25s ease;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s;}
  header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:100;}
  .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .stats-bar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;gap:8px;overflow-x:auto;flex-shrink:0;}
  .stat-chip{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;cursor:pointer;flex-shrink:0;transition:all .15s;border:1px solid var(--border);}
  .filters{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  table{width:100%;border-collapse:collapse;}
  th{padding:11px 14px;font-size:11px;color:var(--dim);font-weight:600;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);}
  td{padding:11px 14px;border-bottom:1px solid #0f172a;font-size:13px;}
  .board-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}
  .instr-card{padding:14px;cursor:pointer;transition:border-color .15s;}
  .instr-card:hover{border-color:#334155;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  label.lbl{font-size:11px;color:var(--dim);font-weight:600;display:block;margin-bottom:5px;}
  .prog-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:2px;transition:width .3s;}
  .view-toggle{display:flex;gap:4px;background:var(--border);border-radius:8px;padding:3px;}
  .vt-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;transition:all .15s;background:transparent;color:var(--dim);}
  .vt-btn.active{background:var(--blue);color:#fff;}
  .subj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:20px;}
  #toast{position:fixed;bottom:24px;right:24px;z-index:300;display:none;}
  .empty-col{border:1px dashed var(--border);border-radius:10px;padding:20px 0;text-align:center;color:var(--faint);font-size:12px;}
  .btn-export{background:#0f2d0f;color:var(--green);border:1px solid #14532d;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;}
  .btn-export:hover{background:#14532d;}
  /* 실시간 연결 상태 표시 */
  .conn-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;}
  .conn-dot.on{background:#22c55e;box-shadow:0 0 6px #22c55e;}
  .conn-dot.off{background:#ef4444;}
  /* 모바일 메뉴 */
  .mobile-menu{display:none;position:absolute;top:60px;right:12px;background:#111827;border:1px solid #1e293b;border-radius:12px;padding:8px;z-index:500;flex-direction:column;gap:4px;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
  .mobile-menu button{width:100%;text-align:left;padding:8px 12px;border-radius:8px;font-size:13px;background:transparent;border:none;}
  .mobile-menu button:hover{background:#1e293b;}
  .hamburger{display:none;background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:6px 10px;border-radius:8px;font-size:16px;cursor:pointer;}
  .desktop-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  @media(max-width:768px){
    header{padding:10px 14px;}
    .desktop-btns{display:none;}
    .hamburger{display:block;}
    .view-toggle .vt-btn{padding:5px 8px;font-size:11px;}
    main{padding:12px 12px;}
    .filters{padding:8px 12px;}
    .stats-bar{padding:8px 12px;}
    .board-wrap{grid-template-columns:1fr;}
    .subj-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));}
    .form-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>


<!-- 이름 선택 모달 -->
<div id="workerModal" style="display:none;position:fixed;inset:0;background:#0a0f1a;align-items:center;justify-content:center;z-index:998;flex-direction:column;">
  <div style="text-align:center;animation:slideIn .3s ease;">
    <div style="font-size:32px;margin-bottom:16px;">👋</div>
    <div style="font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:8px;">안녕하세요!</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:32px;">오늘 작업하시는 분은 누구세요?</div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button onclick="selectWorker('백기웅')" style="background:#111827;border:1px solid #1e293b;color:#e2e8f0;padding:16px 28px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;"
        onmouseover="this.style.background='#1e3a5f';this.style.borderColor='#3b82f6';this.style.color='#60a5fa'"
        onmouseout="this.style.background='#111827';this.style.borderColor='#1e293b';this.style.color='#e2e8f0'">
        👨 백기웅
      </button>
      <button onclick="selectWorker('윤소라')" style="background:#111827;border:1px solid #1e293b;color:#e2e8f0;padding:16px 28px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;"
        onmouseover="this.style.background='#1e3a5f';this.style.borderColor='#3b82f6';this.style.color='#60a5fa'"
        onmouseout="this.style.background='#111827';this.style.borderColor='#1e293b';this.style.color='#e2e8f0'">
        👩 윤소라
      </button>
      <button onclick="selectWorker('김영균')" style="background:#111827;border:1px solid #1e293b;color:#e2e8f0;padding:16px 28px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;"
        onmouseover="this.style.background='#1e3a5f';this.style.borderColor='#3b82f6';this.style.color='#60a5fa'"
        onmouseout="this.style.background='#111827';this.style.borderColor='#1e293b';this.style.color='#e2e8f0'">
        👨 김영균
      </button>
    </div>
  </div>
</div>

<!-- 로그인 화면 -->
<div id="loginScreen" style="display:flex;position:fixed;inset:0;background:#0a0f1a;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:0;">
  <div style="text-align:center;animation:slideIn .4s ease;">
    <div style="width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;">🎓</div>
    <div style="font-size:22px;font-weight:700;color:#f1f5f9;margin-bottom:6px;">강사 섭외 관리</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:32px;">접근 권한이 있는 계정으로 로그인하세요</div>
    <button onclick="googleLogin()" style="display:flex;align-items:center;gap:10px;background:#fff;color:#1f2937;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;margin:0 auto;box-shadow:0 4px 16px rgba(0,0,0,.3);transition:transform .15s;"
      onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google 계정으로 로그인
    </button>
    <div id="loginError" style="margin-top:16px;font-size:12px;color:#ef4444;min-height:20px;"></div>
  </div>
</div>

<!-- 앱 전체 래퍼 -->
<div id="appScreen" style="display:none;flex-direction:column;min-height:100vh;">

<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="logo">🎓</div>
    <div>
      <div style="font-size:16px;font-weight:700;color:#f1f5f9;letter-spacing:-.3px;">강사 섭외 관리</div>
      <div style="font-size:11px;color:var(--dim);display:flex;align-items:center;">
        <span class="conn-dot off" id="connDot"></span>
        <span id="connText">연결 중...</span>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <div class="view-toggle">
      <button class="vt-btn active" id="btn-board" onclick="switchView('board')">📋 보드</button>
      <button class="vt-btn" id="btn-table" onclick="switchView('table')">📊 테이블</button>
    </div>
    <!-- 데스크탑 버튼들 -->
    <div class="desktop-btns">
      <button class="btn-export" onclick="exportCSV()">⬇ CSV</button>
      <button onclick="exportJSON()" style="background:#0f2d1f;color:#22c55e;border:1px solid #14532d;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;">💾 백업</button>
      <button onclick="openTrash()" style="background:#1a0a0a;color:#f87171;border:1px solid #7f1d1d;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;">🗑️ 휴지통</button>
      <button onclick="openSubjectModal()" style="background:#0f1f3d;color:#60a5fa;border:1px solid #1e3a5f;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;">📚 과목 관리</button>
      <button onclick="document.getElementById('firebaseModal').style.display='flex'" style="background:#1a1000;color:#f59e0b;border:1px solid #f59e0b50;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;">⚙️ Firebase 설정</button>
      <div id="userInfo" style="display:flex;align-items:center;gap:8px;padding:4px 12px;background:#111827;border:1px solid #1e293b;border-radius:8px;"></div>
    </div>
    <button class="btn-primary" onclick="openForm()">+ 강사 추가</button>
    <!-- 모바일 햄버거 -->
    <button class="hamburger" onclick="toggleMobileMenu()">☰</button>
  </div>
  <!-- 모바일 드롭다운 메뉴 -->
  <div class="mobile-menu" id="mobileMenu">
    <div id="mobileUserInfo" style="padding:8px 12px;border-bottom:1px solid #1e293b;margin-bottom:4px;font-size:12px;color:#94a3b8;"></div>
    <button onclick="exportCSV();toggleMobileMenu()" style="color:#22c55e;">⬇ CSV 내보내기</button>
    <button onclick="exportJSON();toggleMobileMenu()" style="color:#22c55e;">💾 데이터 백업</button>
    <button onclick="openTrash();toggleMobileMenu()" style="color:#f87171;">🗑️ 휴지통</button>
    <button onclick="openSubjectModal();toggleMobileMenu()" style="color:#60a5fa;">📚 과목 관리</button>
    <button onclick="document.getElementById('firebaseModal').style.display='flex';toggleMobileMenu()" style="color:#f59e0b;">⚙️ Firebase 설정</button>
    <div style="border-top:1px solid #1e293b;margin-top:4px;padding-top:4px;">
      <button onclick="googleLogout()" style="color:#ef4444;">🚪 로그아웃</button>
    </div>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar" id="statsBar"></div>

<!-- FILTERS -->
<div class="filters">
  <input class="input-field" id="searchInput" placeholder="🔍 이름, 과목, 연락처 검색..."
    oninput="render()" style="width:220px;padding:7px 12px;font-size:12px;">
  <div id="subjectPills" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:5px;">
    <span style="font-size:11px;color:var(--dim);">정렬:</span>
    <select class="input-field" id="sortKey" onchange="render()" style="width:auto;padding:5px 8px;font-size:12px;">
      <option value="name">이름순</option>
      <option value="subject">과목순</option>
      <option value="status">상태순</option>
      <option value="priority">우선순위순</option>
    </select>
  </div>
</div>

<!-- MAIN -->
<main style="padding:20px 24px;" id="mainContent">
  <div style="text-align:center;padding:80px 0;color:var(--dim);">
    <div style="font-size:28px;margin-bottom:12px;animation:spin 1s linear infinite;display:inline-block;">⟳</div>
    <div style="font-size:14px;">Firebase 연결 중...</div>
  </div>
</main>

<!-- 휴지통 모달 -->
<div class="modal-bg" id="trashModal" style="display:none;">

<script>
// ─── CONFIG ───────────────────────────────────────────────
const DEFAULT_SUBJECTS = ["컴활1급","컴활2급","한식조리기능사","문신사","경비지도사","SQLD","ADSP","빅데이터분석기사","정보보안기사","손해평가사"];
let SUBJECTS = JSON.parse(localStorage.getItem("custom_subjects") || JSON.stringify(DEFAULT_SUBJECTS));
function saveSubjects() { localStorage.setItem("custom_subjects", JSON.stringify(SUBJECTS)); }
const STATUS_CFG = {
  "미접촉": {color:"#94a3b8",bg:"#1e293b",icon:"○"},
  "연락중":  {color:"#f59e0b",bg:"#2d1f00",icon:"◑"},
  "협의중":  {color:"#3b82f6",bg:"#0f1f3d",icon:"◕"},
  "섭외완료":{color:"#22c55e",bg:"#0a2010",icon:"●"},
  "섭외실패":{color:"#ef4444",bg:"#2d0a0a",icon:"✕"},
};
const PRIORITY_CFG = {"높음":"#ef4444","보통":"#f59e0b","낮음":"#64748b"};
const SEARCH_QUERIES = {
  "컴활1급":    ["컴활1급 강사 섭외 연락처","컴퓨터활용능력 1급 강사 모집","컴활1급 강의 강사 프리랜서"],
  "컴활2급":    ["컴활2급 강사 섭외 연락처","컴퓨터활용능력 2급 강사 모집","컴활 강사 구인"],
  "한식조리기능사":["한식조리기능사 강사 섭외","조리기능사 강의 강사 연락처","한식조리 자격증 강사 모집"],
  "문신사":     ["문신사 자격증 강사 섭외","문신사 강의 강사 연락처","문신사 자격증 강의 모집"],
  "경비지도사":  ["경비지도사 강사 섭외 연락처","경비지도사 강의 강사 모집","경비지도사 자격증 강사"],
  "SQLD":      ["SQLD 강사 섭외 연락처","SQLD 강의 강사 모집","SQL 자격증 강사 프리랜서"],
  "ADSP":      ["ADSP 강사 섭외 연락처","ADSP 데이터분석준전문가 강사 모집","ADSP 강의 강사"],
  "빅데이터분석기사":["빅데이터분석기사 강사 섭외","빅데이터 강의 강사 연락처","빅데이터분석기사 강사 모집"],
  "정보보안기사": ["정보보안기사 강사 섭외 연락처","정보보안기사 강의 강사 모집","정보보안 자격증 강사"],
};
const SITE_LIST = [
  {name:"크몽",url:"https://kmong.com/search?keyword=",desc:"프리랜서 강사 직접 검색·연락 가능",tag:"프리랜서",color:"#f59e0b"},
  {name:"탈잉",url:"https://taling.me/search?q=",desc:"튜터 프로필·연락처 공개",tag:"튜터",color:"#3b82f6"},
  {name:"클래스101",url:"https://class101.net/search?query=",desc:"크리에이터 프로필 확인 가능",tag:"온라인",color:"#8b5cf6"},
  {name:"에듀윌",url:"https://www.eduwill.net/search?keyword=",desc:"자격증 전문 강사 보유",tag:"자격증",color:"#22c55e"},
  {name:"해커스",url:"https://www.hackers.com/search?q=",desc:"IT·자격증 강사 다수 보유",tag:"IT",color:"#ef4444"},
  {name:"네이버 카페",url:"https://cafe.naver.com/ArticleSearchList.nhn?search.query=",desc:"강사 구인·구직 카페 통합 검색",tag:"커뮤니티",color:"#06b6d4"},
  {name:"사람인",url:"https://www.saramin.co.kr/zf_user/search?searchword=",desc:"강사직 채용공고 및 프리랜서 구인",tag:"채용",color:"#f97316"},
  {name:"링크드인",url:"https://www.linkedin.com/search/results/people/?keywords=",desc:"현직자 프로필 직접 검색 및 메시지",tag:"네트워크",color:"#0ea5e9"},
];

// ─── STATE ────────────────────────────────────────────────
window._instructors = window._instructors || [];
let editId = null, deleteId = null, currentView = "board";
let filterSubject = "전체", filterStatus = "전체", toastTimer = null;
window._appReady = false;

// ─── Firebase 연결 대기 ────────────────────────────────────
document.addEventListener("firebase-ready", () => {
  // workerName 선택 후 render() 호출되므로 여기선 대기
  setConn(true);
});

// Firebase 설정값이 코드에 직접 포함되어 있으므로 배너 불필요

function setConn(on) {
  document.getElementById("connDot").className = "conn-dot " + (on?"on":"off");
  document.getElementById("connText").textContent = on ? "실시간 연결됨 · 모든 변경사항 자동 저장" : "연결 안됨 · Firebase 설정 필요";
}

// ─── HELPERS ──────────────────────────────────────────────
function gi() { return window._instructors || []; }

function filtered() {
  const q = (document.getElementById("searchInput")||{}).value?.toLowerCase()||"";
  const sortKey = (document.getElementById("sortKey")||{}).value||"name";
  let arr = gi().filter(i => {
    if(i.deleted) return false;
    return (filterSubject==="전체"||i.subject===filterSubject) &&
           (filterStatus==="전체"||i.status===filterStatus) &&
           (!q||i.name?.includes(q)||i.subject?.includes(q)||(i.phone||"").includes(q)||(i.email||"").toLowerCase().includes(q));
  });
  const ord={높음:0,보통:1,낮음:2}, sord=Object.keys(STATUS_CFG);
  arr.sort((a,b)=>{
    if(sortKey==="name") return (a.name||"").localeCompare(b.name||"","ko");
    if(sortKey==="subject") return (a.subject||"").localeCompare(b.subject||"","ko");
    if(sortKey==="status") return sord.indexOf(a.status)-sord.indexOf(b.status);
    if(sortKey==="priority") return ord[a.priority]-ord[b.priority];
    return 0;
  });
  return arr;
}

// ─── RENDER ───────────────────────────────────────────────
window.render = function() {
  renderStats();
  renderPills();
  if(currentView==="board") renderBoard();
  else renderTable();
};

function renderStats() {
  const bar = document.getElementById("statsBar");
  if(!bar) return;
  let html="";
  Object.entries(STATUS_CFG).forEach(([s,c])=>{
    const cnt = gi().filter(i=>!i.deleted&&i.status===s).length;
    const active = filterStatus===s;
    html+=`<div class="stat-chip" onclick="toggleStatusFilter('${s}')"
      style="background:${active?c.bg:"var(--card)"};border-color:${active?c.color+"60":"var(--border)"};">
      <span style="color:${c.color};font-size:15px;">${c.icon}</span>
      <span style="font-size:12px;color:var(--muted);">${s}</span>
      <span style="font-size:16px;font-weight:700;color:${c.color};font-family:'Space Mono',monospace;">${cnt}</span>
    </div>`;
  });
  html+=`<div style="margin-left:auto;display:flex;align-items:center;gap:5px;flex-shrink:0;padding:0 8px;">
    <span style="font-size:12px;color:var(--dim);">전체</span>
    <span style="font-size:18px;font-weight:700;color:#f1f5f9;font-family:'Space Mono',monospace;">${gi().filter(i=>!i.deleted).length}</span>
    <span style="font-size:12px;color:var(--dim);">명</span>
  </div>`;
  bar.innerHTML=html;
}

function renderPills() {
  const wrap = document.getElementById("subjectPills");
  if(!wrap) return;
  wrap.innerHTML=["전체",...SUBJECTS].map(s=>{
    const active=filterSubject===s;
    return `<button class="pill" onclick="setSubject('${s}')"
      style="background:${active?"var(--blue)":"var(--border)"};color:${active?"#fff":"var(--muted)"};border-color:${active?"var(--blue)":"var(--border)"};">${s}</button>`;
  }).join("");
}

function renderBoard() {
  const main=document.getElementById("mainContent"); if(!main)return;
  const list=filtered();
  let subjHtml=`<div class="subj-grid">`;
  SUBJECTS.forEach(s=>{
    const total=gi().filter(i=>!i.deleted&&i.subject===s).length;
    const done=gi().filter(i=>!i.deleted&&i.subject===s&&i.status==="섭외완료").length;
    const pct=total>0?Math.round((done/total)*100):0;
    subjHtml+=`<div class="card" style="padding:12px 14px;">
      <div style="font-size:11px;color:var(--dim);font-weight:600;margin-bottom:7px;">${s}</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${done===total&&total>0?"#22c55e":"#3b82f6"};"></div></div>
        <span style="font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;white-space:nowrap;">${done}/${total}</span>
      </div>
    </div>`;
  });
  subjHtml+=`</div>`;
  let boardHtml=`<div class="board-wrap">`;
  Object.entries(STATUS_CFG).forEach(([status,cfg])=>{
    const items=list.filter(i=>i.status===status);
    let col=`<div><div style="display:flex;align-items:center;gap:6px;padding:6px 0;margin-bottom:8px;">
      <span style="color:${cfg.color};font-size:15px;">${cfg.icon}</span>
      <span style="font-size:12px;font-weight:600;color:var(--muted);">${status}</span>
      <span style="margin-left:auto;font-size:11px;font-weight:700;font-family:'Space Mono',monospace;color:${cfg.color};background:${cfg.bg};padding:1px 8px;border-radius:10px;">${items.length}</span>
    </div>`;
    if(!items.length) col+=`<div class="empty-col">없음</div>`;
    items.forEach(item=>{
      const pc=PRIORITY_CFG[item.priority]||"#64748b";
      const others=Object.keys(STATUS_CFG).filter(s=>s!==status).slice(0,3);
      col+=`<div class="card instr-card animate-in" onclick="openEdit('${item.id}')" style="margin-bottom:8px;border-left:3px solid ${cfg.color};padding-left:11px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
          <div>
            <div style="font-size:14px;font-weight:700;color:#f1f5f9;">${item.name||""}</div>
            <div style="font-size:11px;color:var(--dim);margin-top:2px;">${item.subject||""}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
            <span class="tag" style="background:${pc}20;color:${pc};">${item.priority||"보통"}</span>
            <span style="font-size:10px;font-weight:700;color:${cfg.color};background:${cfg.bg};padding:2px 7px;border-radius:6px;">${cfg.icon} ${status}</span>
          </div>
        </div>
        ${item.phone?`<div style="font-size:11px;color:#475569;margin-bottom:3px;">📞 ${item.phone}</div>`:""}
        ${item.contact?`<div style="font-size:11px;color:#475569;margin-bottom:6px;">👤 ${item.contact}</div>`:""}
        ${item.memo?`<div style="font-size:11px;color:var(--dim);background:var(--bg);padding:5px 8px;border-radius:6px;margin-bottom:8px;">${item.memo.length>32?item.memo.slice(0,32)+"…":item.memo}</div>`:""}
        ${item.lastModifiedBy?`<div style="font-size:10px;color:#334155;margin-bottom:6px;">✏️ ${item.lastModifiedBy} · ${item.lastModifiedAt||""}</div>`:""}
        <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;" onclick="event.stopPropagation();">
          ${others.map(s=>`<button class="btn-ghost" onclick="event.stopPropagation();updateStatus('${item.id}','${s}')" style="font-size:10px;padding:2px 6px;color:${STATUS_CFG[s].color};border-color:${STATUS_CFG[s].color}30;">${STATUS_CFG[s].icon} ${s}</button>`).join("")}
          <button onclick="event.stopPropagation();openDelete('${item.id}')" style="margin-left:auto;background:#2d0a0a;color:#f87171;border:1px solid #7f1d1d;font-size:11px;padding:3px 8px;border-radius:5px;font-weight:600;">삭제</button>
        </div>
      </div>`;
    });
    col+=`</div>`;
    boardHtml+=col;
  });
  boardHtml+=`</div>`;
  main.innerHTML=(filterSubject==="전체"?subjHtml:"")+boardHtml;
}

function renderTable() {
  const list=filtered();
  let rows=list.map(item=>{
    const pc=PRIORITY_CFG[item.priority]||"#64748b";
    return `<tr class="hover-row">
      <td><button onclick="openEdit('${item.id}')" style="background:none;color:#f1f5f9;font-size:13px;font-weight:600;text-decoration:underline;text-decoration-color:#334155;">${item.name||""}</button></td>
      <td><span class="tag" style="background:#1e3a5f;color:#60a5fa;">${item.subject||""}</span></td>
      <td style="font-family:'Space Mono',monospace;color:var(--muted);font-size:12px;">${item.phone||"-"}</td>
      <td style="color:var(--muted);font-size:12px;">${item.email||"-"}</td>
      <td style="color:var(--muted);font-size:12px;">${item.contact||"-"}</td>
      <td style="color:var(--dim);font-size:11px;max-width:130px;"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.career||"미확인"}</div></td>
      <td>
        <select class="input-field" onchange="updateStatus('${item.id}',this.value)" style="width:auto;padding:3px 8px;font-size:11px;">
          ${Object.keys(STATUS_CFG).map(s=>`<option value="${s}"${s===item.status?" selected":""}>${s}</option>`).join("")}
        </select>
      </td>
      <td><span class="tag" style="background:${pc}20;color:${pc};">${item.priority||"보통"}</span></td>
      <td style="color:var(--dim);font-size:11px;max-width:120px;"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.memo||"-"}</div></td>
      <td><div style="display:flex;gap:4px;">
        <button class="btn-ghost" onclick="openEdit('${item.id}')" style="padding:3px 10px;font-size:11px;">수정</button>
        <button class="btn-danger" onclick="openDelete('${item.id}')">삭제</button>
      </div></td>
    </tr>`;
  }).join("");
  if(!list.length) rows=`<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--faint);">검색 결과가 없습니다</td></tr>`;
  document.getElementById("mainContent").innerHTML=`
    <div class="card" style="overflow:hidden;"><div style="overflow-x:auto;">
      <table><thead><tr>
        <th>이름</th><th>과목</th><th>연락처</th><th>이메일</th><th>컨택한 사람</th>
        <th>응답여부</th><th>상태</th><th>우선순위</th><th>메모</th><th>액션</th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div></div>`;
}

// ─── ACTIONS ──────────────────────────────────────────────
function toggleStatusFilter(s){filterStatus=filterStatus===s?"전체":s;render();}
function setSubject(s){filterSubject=s;render();}
function switchView(v){
  currentView=v;
  ["board","table"].forEach(k=>document.getElementById("btn-"+k).classList.toggle("active",k===v));
  render();
}

function getModifyInfo() {
  const name = window._workerName || "알 수 없음";
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const timeStr = `${String(now.getFullYear()).slice(2)}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  return {
    lastModifiedBy: name,
    lastModifiedAt: timeStr,
  };
}

function updateStatus(id,status){
  if(window.fbUpdate) window.fbUpdate(id,{status, ...getModifyInfo()});
  showToast(`상태 변경: ${status}`);
}

// ─── FORM ─────────────────────────────────────────────────
function populateFormSelects(){
  document.getElementById("f-subject").innerHTML=SUBJECTS.map(s=>`<option value="${s}">${s}</option>`).join("");
  document.getElementById("f-status").innerHTML=Object.keys(STATUS_CFG).map(s=>`<option value="${s}">${s}</option>`).join("");
}

function openForm(){
  editId=null;
  document.getElementById("formTitle").textContent="➕ 새 강사 추가";
  ["name","phone","email","contact","career","memo"].forEach(k=>document.getElementById("f-"+k).value="");
  document.getElementById("f-subject").value=SUBJECTS[0];
  document.getElementById("f-status").value="미접촉";
  document.getElementById("f-priority").value="보통";
  document.getElementById("formModal").style.display="flex";
}

function openEdit(id){
  const item=gi().find(x=>x.id===id); if(!item)return;
  editId=id;
  document.getElementById("formTitle").textContent="✏️ 강사 정보 수정";
  document.getElementById("f-name").value=item.name||"";
  document.getElementById("f-subject").value=item.subject||SUBJECTS[0];
  document.getElementById("f-phone").value=item.phone||"";
  document.getElementById("f-email").value=item.email||"";
  document.getElementById("f-contact").value=item.contact||"";
  document.getElementById("f-career").value=item.career||"";
  document.getElementById("f-status").value=item.status||"미접촉";
  document.getElementById("f-priority").value=item.priority||"보통";
  document.getElementById("f-memo").value=item.memo||"";
  document.getElementById("formModal").style.display="flex";
}

function closeForm(){document.getElementById("formModal").style.display="none";}

function saveForm(){
  const name=document.getElementById("f-name").value.trim();
  if(!name){showToast("이름을 입력해주세요","error");return;}
  const data={
    name, subject:document.getElementById("f-subject").value,
    phone:document.getElementById("f-phone").value.trim(),
    email:document.getElementById("f-email").value.trim(),
    contact:document.getElementById("f-contact").value.trim(),
    career:document.getElementById("f-career").value.trim(),
    status:document.getElementById("f-status").value,
    priority:document.getElementById("f-priority").value,
    memo:document.getElementById("f-memo").value.trim(),
    ...getModifyInfo(),
  };
  const btn=document.getElementById("saveBtn");
  btn.textContent="저장 중..."; btn.disabled=true;
  if(editId){
    window.fbUpdate && window.fbUpdate(editId,data);
    showToast("수정 완료!");
  } else {
    window.fbAdd && window.fbAdd(data);
    showToast("강사 추가 완료!");
  }
  setTimeout(()=>{btn.textContent="저장하기";btn.disabled=false;},800);
  closeForm();
}

// ─── DELETE ───────────────────────────────────────────────
function openDelete(id){
  deleteId=id;
  const item=gi().find(x=>x.id===id);
  document.getElementById("delName").textContent=`"${item?.name}" 강사의 정보가 삭제됩니다.`;
  document.getElementById("delModal").style.display="flex";
}
function closeDelete(){document.getElementById("delModal").style.display="none";deleteId=null;}
function confirmDelete(){
  if(!deleteId)return;
  // 소프트 딜리트 — 실제 삭제 대신 deleted 상태로 변경
  const item = gi().find(x=>x.id===deleteId);
  if(item) {
    window.fbUpdate && window.fbUpdate(deleteId, {
      ...item,
      deleted: true,
      deletedBy: window._workerName||"알 수 없음",
      deletedAt: (() => {
        const now=new Date(), pad=n=>String(n).padStart(2,'0');
        return `${String(now.getFullYear()).slice(2)}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
      })()
    });
  }
  closeDelete(); showToast("휴지통으로 이동했어요");
}

// ─── 휴지통 ───────────────────────────────────────────────
function openTrash(){
  const trashed = (window._instructors||[]).filter(i=>i.deleted);
  const list = document.getElementById("trashList");
  if(!trashed.length){
    list.innerHTML=`<div style="text-align:center;padding:40px;color:#334155;font-size:13px;">휴지통이 비어있어요</div>`;
  } else {
    list.innerHTML = trashed.map(item=>`
      <div class="card" style="padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
        <div>
          <div style="font-size:13px;font-weight:600;color:#f1f5f9;">${item.name||""}</div>
          <div style="font-size:11px;color:#64748b;margin-top:3px;">${item.subject||""} · 삭제: ${item.deletedBy||""} ${item.deletedAt||""}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;">
          <button onclick="restoreItem('${item.id}')" style="background:#0a2010;color:#22c55e;border:1px solid #14532d;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;">복구</button>
          <button onclick="hardDelete('${item.id}')" style="background:#2d0a0a;color:#ef4444;border:1px solid #7f1d1d;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;">완전삭제</button>
        </div>
      </div>`).join("");
  }
  document.getElementById("trashModal").style.display="flex";
}

function restoreItem(id){
  window.fbUpdate && window.fbUpdate(id, {deleted:false, deletedBy:null, deletedAt:null});
  showToast("복구 완료!");
  openTrash();
}

function hardDelete(id){
  window.fbDelete && window.fbDelete(id);
  showToast("완전 삭제 완료");
  openTrash();
}

// ─── JSON 백업 ────────────────────────────────────────────
function exportJSON(){
  const data = (window._instructors||[]).filter(i=>!i.deleted);
  const json = JSON.stringify(data, null, 2);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([json],{type:"application/json"}));
  a.download = `강사섭외백업_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast("백업 완료!");
}

// ─── CSV ──────────────────────────────────────────────────
function exportCSV(){
  const headers=["이름","과목","연락처","이메일","컨택한 사람","응답여부","상태","우선순위","메모"];
  const rows=gi().map(i=>[i.name,i.subject,i.phone,i.email,i.contact,i.career,i.status,i.priority,i.memo].map(v=>`"${(v||"").replace(/"/g,'""')}"`).join(","));
  const csv="\uFEFF"+[headers.join(","),...rows].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
  a.download=`강사섭외현황_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); showToast("CSV 내보내기 완료!");
}

// ─── TOAST ────────────────────────────────────────────────
function showToast(msg,type="success"){
  const t=document.getElementById("toast");
  t.style.display="block";
  t.style.background=type==="error"?"#7f1d1d":"#14532d";
  t.style.border=`1px solid ${type==="error"?"#ef4444":"#22c55e"}`;
  t.style.color="#fff";
  t.textContent=(type==="error"?"⚠️ ":"✓ ")+msg;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.style.display="none";},2500);
}

// ─── FIREBASE CONFIG UI ───────────────────────────────────
function parsePaste(){
  const raw = document.getElementById("fb-paste").value;
  const fields = ["apiKey","authDomain","databaseURL","projectId","storageBucket","messagingSenderId","appId"];
  fields.forEach(key => {
    const match = raw.match(new RegExp(`${key}\\s*:\\s*["']([^"']+)["']`));
    if(match) document.getElementById("fb-"+key).value = match[1];
  });
}

function saveFirebaseConfig(){
  const cfg = {
    apiKey:            document.getElementById("fb-apiKey").value.trim(),
    authDomain:        document.getElementById("fb-authDomain").value.trim(),
    databaseURL:       document.getElementById("fb-databaseURL").value.trim(),
    projectId:         document.getElementById("fb-projectId").value.trim(),
    storageBucket:     document.getElementById("fb-storageBucket").value.trim(),
    messagingSenderId: document.getElementById("fb-messagingSenderId").value.trim(),
    appId:             document.getElementById("fb-appId").value.trim(),
  };
  if(!cfg.apiKey||!cfg.databaseURL){showToast("apiKey와 databaseURL은 필수입니다","error");return;}
  localStorage.setItem("firebase_config", JSON.stringify(cfg));
  document.getElementById("firebaseModal").style.display="none";
  showToast("설정 저장 완료! 페이지를 새로고침합니다...");
  setTimeout(()=>location.reload(), 1500);
}

// 저장된 설정 불러와서 폼에 채우기
function loadSavedConfig(){
  const saved = localStorage.getItem("firebase_config");
  if(!saved) return;
  const cfg = JSON.parse(saved);
  Object.entries(cfg).forEach(([k,v])=>{
    const el = document.getElementById("fb-"+k);
    if(el) el.value = v;
  });
}
loadSavedConfig();

// ─── 과목 관리 ────────────────────────────────────────────
function openSubjectModal(){
  renderSubjectList();
  document.getElementById("subjectModal").style.display="flex";
}
function renderSubjectList(){
  const list = document.getElementById("subjectList");
  list.innerHTML = SUBJECTS.map((s,i)=>`
    <div draggable="true" data-idx="${i}"
      style="display:flex;align-items:center;gap:8px;background:#0a0f1a;border:1px solid #1e293b;border-radius:8px;padding:8px 12px;cursor:grab;transition:opacity .15s;"
      ondragstart="dragStart(event,${i})"
      ondragover="event.preventDefault()"
      ondrop="dragDrop(event,${i})"
      ondragend="dragEnd(event)">
      <span style="color:#334155;font-size:14px;cursor:grab;">☰</span>
      <span style="font-size:13px;color:#e2e8f0;flex:1;">${s}</span>
      <button onclick="deleteSubject(${i})" style="background:transparent;color:#475569;font-size:16px;padding:0 4px;"
        onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#475569'">✕</button>
    </div>`).join("");
}

let _dragIdx = null;
function dragStart(e, idx){ _dragIdx=idx; e.target.style.opacity=".4"; }
function dragEnd(e){ e.target.style.opacity="1"; }
function dragDrop(e, toIdx){
  if(_dragIdx===null||_dragIdx===toIdx) return;
  const moved = SUBJECTS.splice(_dragIdx,1)[0];
  SUBJECTS.splice(toIdx,0,moved);
  _dragIdx=null;
  saveSubjects();
  renderSubjectList();
  populateFormSelects();
  render();
  showToast("과목 순서 변경!");
}
function addSubject(){
  const input=document.getElementById("newSubjectInput");
  const val=input.value.trim();
  if(!val){showToast("과목명을 입력해주세요","error");return;}
  if(SUBJECTS.includes(val)){showToast("이미 있는 과목이에요","error");return;}
  SUBJECTS.push(val);
  saveSubjects();
  input.value="";
  renderSubjectList();
  populateFormSelects();
  render();
  showToast(`"${val}" 과목 추가!`);
}
function deleteSubject(idx){
  const name=SUBJECTS[idx];
  if(gi().some(i=>i.subject===name)){showToast(`"${name}"은 사용 중인 과목이에요`,"error");return;}
  SUBJECTS.splice(idx,1);
  saveSubjects();
  renderSubjectList();
  populateFormSelects();
  render();
  showToast(`"${name}" 과목 삭제`);
}

populateFormSelects();
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeForm();closeDelete();document.getElementById("subjectModal").style.display="none";document.getElementById("mobileMenu").style.display="none";}});

function toggleMobileMenu(){
  const menu=document.getElementById("mobileMenu");
  menu.style.display=menu.style.display==="flex"?"none":"flex";
}
document.addEventListener("click",e=>{
  const menu=document.getElementById("mobileMenu");
  if(menu&&!menu.contains(e.target)&&!e.target.closest(".hamburger")){
    menu.style.display="none";
  }
});
</script>
